<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laundry Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="launcherIframe" 
    src=""
    allowfullscreen
    allow="fullscreen">
  </iframe>

  <script>
    // Detect mobile devices via user agent (you can refine the regex as needed)
    const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    
    const iframe = document.getElementById('launcherIframe');
    const baseUrl = 'https://script.google.com/macros/s/AKfycbyiqxYZD6_wEVCYx8q6C9EJKdx58lLuiskQB046Z_NHoON2kvNeNdycmiDAwYOCo7aT/exec';
    
    // Set the iframe src based on device type
    iframe.src = isMobile ? baseUrl + '?mode=mobile' : baseUrl;
    
    // Listen for full‑screen requests from the embedded app
    window.addEventListener('message', function(event) {
      // Optional: verify the origin for security (uncomment if needed)
      // if (event.origin !== 'https://script.google.com') return;
      
      if (event.data === 'requestFullscreen') {
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) { // Safari
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {    // IE/Edge
          iframe.msRequestFullscreen();
        }
      }
    });
  </script>
</body>
</html>
