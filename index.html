<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laundry Management System</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; }
    iframe { width: 100%; height: 100%; border: none; }
    .external-fullscreen {
      position: fixed;
      top: 16px;
      right: 16px;
      background: rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(4px);
      color: white;
      border: none;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      font-size: 20px;
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .external-fullscreen:hover {
      background: #007bff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <iframe id="launcherIframe" 
    src=""
    referrerpolicy="no-referrer"
    allowfullscreen
    allow="fullscreen">
  </iframe>

  <button id="externalFullscreenBtn" class="external-fullscreen" title="Full screen">⤢</button>

  <script>
    const baseUrl = 'https://script.google.com/macros/s/AKfycbwVRmZjXQi9MxpyoaQns4FQnR2dYEo0qcfN08iPBrWwxvyFYL5hYLcDng4MDQMmWKve/exec';
    const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    const iframe = document.getElementById('launcherIframe');
    
    // Force mobile version on mobile devices
    iframe.src = isMobile ? baseUrl + '?mode=mobile' : baseUrl;

    // Full‑screen on entire document (works first click)
    const btn = document.getElementById('externalFullscreenBtn');
    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        document.documentElement.requestFullscreen().catch(console.warn);
      } else {
        document.exitFullscreen();
      }
    }
    btn.addEventListener('click', toggleFullscreen);

    document.addEventListener('fullscreenchange', () => {
      btn.textContent = document.fullscreenElement ? '✕' : '⤢';
      btn.title = document.fullscreenElement ? 'Exit full screen' : 'Full screen';
    });
  </script>
</body>
</html>
