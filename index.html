<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laundry Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    /* Floating full‑screen button */
    .external-fullscreen {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px);
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 28px;
      cursor: pointer;
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .external-fullscreen:hover {
      background: #007bff;
      transform: scale(1.05);
    }
  </style>
</head>
<body>
  <!-- Detect mobile device and append ?mode=mobile automatically -->
  <iframe id="launcherIframe" 
    src=""
    allowfullscreen
    allow="fullscreen">
  </iframe>

  <button id="externalFullscreenBtn" class="external-fullscreen" title="Full screen">⤢</button>

  <script>
    // --- Device detection for mobile version ---
    const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|Opera Mini|IEMobile|WPDesktop/i.test(navigator.userAgent);
    const iframe = document.getElementById('launcherIframe');
    const baseUrl = 'https://script.google.com/macros/s/AKfycbwVRmZjXQi9MxpyoaQns4FQnR2dYEo0qcfN08iPBrWwxvyFYL5hYLcDng4MDQMmWKve/exec';
    
    iframe.src = isMobile ? baseUrl + '?mode=mobile' : baseUrl;

    // --- External full‑screen button logic ---
    const btn = document.getElementById('externalFullscreenBtn');

    function toggleFullscreen() {
      if (!document.fullscreenElement) {
        // Request full‑screen on the iframe element
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen().catch(err => console.warn(err));
        } else if (iframe.webkitRequestFullscreen) { // Safari
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) {     // IE/Edge
          iframe.msRequestFullscreen();
        }
      } else {
        document.exitFullscreen();
      }
    }

    btn.addEventListener('click', toggleFullscreen);

    // Update button icon when full‑screen changes
    document.addEventListener('fullscreenchange', () => {
      if (document.fullscreenElement) {
        btn.textContent = '✕';
        btn.title = 'Exit full screen';
      } else {
        btn.textContent = '⤢';
        btn.title = 'Full screen';
      }
    });
  </script>
</body>
</html>
