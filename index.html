<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Laundry Management System</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body, html {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe id="launcherIframe" 
    src="https://script.google.com/macros/s/AKfycbxr78eLr7c1zWSqP_BALjZoR8TXltEh4cDN-qttxsPP1_Rd1sVS7UTs7A8rK82Bh-_k/exec"
    allowfullscreen
    allow="fullscreen">
  </iframe>

  <script>
    const iframe = document.getElementById('launcherIframe');
    
    // Listen for full‑screen requests from the embedded app
    window.addEventListener('message', function(event) {
      // Optional: verify the origin for security (uncomment and adapt if needed)
      // if (event.origin !== 'https://script.google.com') return;
      
      if (event.data === 'requestFullscreen') {
        if (iframe.requestFullscreen) {
          iframe.requestFullscreen();
        } else if (iframe.webkitRequestFullscreen) { /* Safari */
          iframe.webkitRequestFullscreen();
        } else if (iframe.msRequestFullscreen) { /* IE/Edge (rare) */
          iframe.msRequestFullscreen();
        }
      }
    });
  </script>
</body>
</html>
